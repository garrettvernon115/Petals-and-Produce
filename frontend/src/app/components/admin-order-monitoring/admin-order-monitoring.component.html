<h2 class="title">Admin Order Monitoring</h2>

<div *ngIf="orders.length === 0" class="empty">
  No orders found.
</div>

<div *ngFor="let order of orders" class="order-card">
  <header>
    <span class="date">{{ order.orderDate | date: 'mediumDate' }}</span>
    <span class="status" [ngClass]="order.status.toLowerCase()">{{ order.status }}</span>
  </header>

  <p><strong>Customer:</strong> {{ order.customerName || 'Unknown' }}</p>


  <ul class="items">
    <li *ngFor="let item of order.items">
      <span>{{ item.quantity }} × {{ item.name }}</span>
      <span>{{ item.unitPrice | currency }}</span>
    </li>
  </ul>

  <footer>
    <strong>Total:</strong>
    <span class="total">{{ total(order) | currency }}</span>
  </footer>

  <label for="status">Update Status:</label>
  <select #statusSelect [value]="order.status" (change)="updateStatus(order, $any(statusSelect).value)">
    <option *ngFor="let status of statusOptions" [value]="status">{{ status }}</option>
  </select>

</div>
