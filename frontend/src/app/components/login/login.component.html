<main class="app-demo">
  <mat-card class="login-card">
    <h2>Login</h2>
    <form #loginForm="ngForm" (ngSubmit)="onSubmit()">
      <div class="form-control">
        <label for="username">Username:</label>
        <input id="username" [(ngModel)]="username" name="username" required />
      </div>

      <div class="form-control">
        <label for="password">Password:</label>
        <input id="password" type="password" [(ngModel)]="password" name="password" required />
      </div>

      <button mat-raised-button class="primary" type="submit" [disabled]="!loginForm.valid">
        Login
      </button>
    </form>

<div>
  <button mat-button routerLink="/register">No account? Register Now</button>
</div>

  </mat-card>
</main>
