<h2>Your Cart</h2>

<table mat-table [dataSource]="cartItems" class="mat-elevation-z2 cart-table">

  <!-- Image Column -->
  <ng-container matColumnDef="image">
    <th mat-header-cell *matHeaderCellDef> Image </th>
    <td mat-cell *matCellDef="let item">
      <img [src]="item.imageUrl" alt="{{ item.name }}" class="cart-image" />
    </td>
  </ng-container>

  <!-- Name Column -->
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef> Item </th>
    <td mat-cell *matCellDef="let item"> {{ item.name }} </td>
  </ng-container>

  <!-- Price Column -->
  <ng-container matColumnDef="price">
    <th mat-header-cell *matHeaderCellDef> Price </th>
    <td mat-cell *matCellDef="let item"> ${{ item.price | number: '1.2-2'}} </td>
  </ng-container>

  <!-- Quantity Column -->
  <ng-container matColumnDef="quantity">
    <th mat-header-cell *matHeaderCellDef> Quantity </th>
    <td mat-cell *matCellDef="let item">
      <input
        matInput
        type="number"
        [(ngModel)]="item.quantity"
        (change)="updateQuantity(item)"
        min="1"
        class="quantity-input"
      />
    </td>
  </ng-container>

  <!-- Subtotal Column -->
  <ng-container matColumnDef="subtotal">
    <th mat-header-cell *matHeaderCellDef> Subtotal </th>
    <td mat-cell *matCellDef="let item">
      ${{ item.price * item.quantity | number: '1.2-2' }}
    </td>
  </ng-container>

  <!-- Remove Button Column -->
  <ng-container matColumnDef="remove">
    <th mat-header-cell *matHeaderCellDef> </th>
    <td mat-cell *matCellDef="let item">
<button mat-icon-button color="warn" (click)="removeItem(item.productId)" aria-label="Remove item">
  <mat-icon>delete</mat-icon>
</button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>

<div class="cart-summary">
  <p class="total">
    <strong>Total: ${{ getTotal() | number: '1.2-2' }}</strong>
  </p>
<button mat-raised-button color="primary" class="checkout-button" (click)="placeOrder()">
  Proceed to Checkout
</button>
</div>
