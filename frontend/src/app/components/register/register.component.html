<main class="app-demo">
  <mat-card class="login-card">
    <h2>Register</h2>
    <form #registerForm="ngForm" (ngSubmit)="onSubmit()">
      <div class="form-control">
        <label for="email">Email:</label>
        <input id="email" name="email" [(ngModel)]="email" type="email" required />
      </div>

      <div class="form-control">
        <label for="name">Name:</label>
        <input id="name" name="name" [(ngModel)]="name" required />
      </div>

      <div class="form-control">
        <label for="username">Username:</label>
        <input id="username" name="username" [(ngModel)]="username" required />
      </div>

      <div class="form-control">
        <label for="password">Password:</label>
        <input id="password" name="password" type="password" [(ngModel)]="password" required />
      </div>

      <button mat-raised-button class="primary" type="submit" [disabled]="!registerForm.valid">
        Register
      </button>
    </form>
  </mat-card>
</main>
