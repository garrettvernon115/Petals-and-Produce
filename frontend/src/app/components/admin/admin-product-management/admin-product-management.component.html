

<div class="product-management-container">
  <h2>Product Management</h2>

  <div class="toolbar">
    <button mat-raised-button class="add-button" (click)="addProduct()">
      <mat-icon>add</mat-icon>
      Add Product
    </button>
  </div>

  <!-- Add matSort directive here -->
   <div class="product-table-wrapper">
  <table mat-table [dataSource]="pagedProducts" matSort class="product-table mat-elevation-z4">

    <!-- ID Column -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
      <td mat-cell *matCellDef="let product">{{ product.id }}</td>
    </ng-container>

    <!-- Name Column -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
      <td mat-cell *matCellDef="let product">{{ product.name }}</td>
    </ng-container>

    <!-- Category Column -->
    <ng-container matColumnDef="category">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Category</th>
      <td mat-cell *matCellDef="let product">{{ product.category }}</td>
    </ng-container>

    <!-- Price Column -->
    <ng-container matColumnDef="price">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Price</th>
      <td mat-cell *matCellDef="let product">${{ product.price }}</td>
    </ng-container>

    <!-- Stock Column -->
    <ng-container matColumnDef="stock">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Stock</th>
      <td mat-cell *matCellDef="let product">{{ product.stock }}</td>
    </ng-container>

    <!-- Actions Column -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let product">
        <div class="action-buttons">
          <button mat-icon-button class="icon-button" (click)="openEditDialog(product)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button class="icon-button delete" (click)="delete(product)">
            <mat-icon>delete</mat-icon>
          </button>
        </div>
      </td>
    </ng-container>

    <!-- Header and Row Declarations -->
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
  <!-- Pagination -->
  <div class="pagination-controls">
  <label>Items per page:</label>
  <select [value]="pageSize" (change)="setPageSize($event)">
    <option *ngFor="let size of [5, 10, 25]" [value]="size">{{ size }}</option>
  </select>

  <span>Page {{ currentPage }}</span>

  <button mat-button (click)="prevPage()" [disabled]="currentPage === 1">Previous</button>
  <button mat-button (click)="nextPage()" [disabled]="currentPage * pageSize >= allProducts.length">Next</button>
</div>
</div>
